name: Python CI/CD Pipeline to AWS

on:
  push:
    branches:
      - main # Triggers the pipeline when you push to the main branch

env:
  AWS_REGION: ap-south-1                  # Change to your AWS Region
  ECR_REPOSITORY: docker-images        # Your Amazon ECR repository name
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
  APP_PORT: 5000                          # The port your Python app listens on inside the container
  HOST_PORT: 80                           # The public port on your EC2 instance (e.g., HTTP port 80)

jobs:
  build-and-push:
    name: Build & Push Python Image
    runs-on: ubuntu-latest

    steps:
      # Step 1: Pull down your Python source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Set up AWS CLI credentials for the GitHub runner
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Step 3: Login to ECR so GitHub can push the image
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Step 4: Build your Python Docker image and push it to AWS
      - name: Build, Tag, and Push Image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG .
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG

  deploy-to-ec2:
    name: Deploy Python App to EC2
    needs: build-and-push # Only deploys if the build and push steps succeed
    runs-on: ubuntu-latest

    steps:
      # Step 5: SSH into EC2 and tell it to pull the new Python image
      - name: SSH into EC2 and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Log into ECR using the EC2 instance profile role (No AWS keys needed here!)
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}
            
            # 2. Pull the latest version of your Python app image
            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
            
            # 3. Stop and remove the old Python container if it is running
            docker stop latest || true
            docker rm latest || true
            
            # 4. Spin up the new Python container
            # Maps port 80 of your EC2 to port 5000 inside your Python container
            docker run -d \
              --name python-running-app \
              -p ${{ env.HOST_PORT }}:${{ env.APP_PORT }} \
              --restart always \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
