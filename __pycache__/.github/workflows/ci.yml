name: Project CI Pipeline 

on:
 push:
    branches: [ main ]
 pull_request:
         [ main ]

jobs:
   build-and-test:
          runs-on: ubuntu-latest
          
          steps:
            - name: checkout code 
              uses: actions/checkout@v4
   
            - name: setup Environment Runtime 
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: install dependencies.
              run: |
                python -m pip install --upgrade pip  
                if [ -f requirement.txt ] pip install -r requirement.txt; fi

            -  name: code linter
               run: |
                 pip install flake8
                 #Stop if there python syntax error or undefined name.
                 flake8 . --count --select=E9,F63,F7,F28 --show-source --statistics

            -  name: Run unit tests
               run: |
                 pip install pytest
                 pytest

            -  name: Login the docker hub.
               run: docker-Login/actions@v3
               with:
                  username: ${{secrets.Docker_Username}}     
                  password: ${{secrets.Docker_Password}}
              
            -  name: Build and Push Docker Image.
               run: docker/build-push-actions@v6
               with:
                  context: .
                  push: true
                  tag: docker-image/python-app:latest