name: Project Pipeline 

on:
 push:
    branches: [ main ]
 pull_request:
         [ main ]

env:
   AWS_REGION: ap-south-1
   ECR_REPOSITORY: docker-images
   EC2_USER: ubuntu

jobs:
   build-and-test:
          runs-on: ubuntu-latest
          steps:
            #This one is python code will puted before building container.
            - name: checkout code 
              uses: actions/checkout@v4

            - name: setup Environment Runtime 
              uses: actions/setup-python@v5
              with:
                python-version: '3.11'

            - name: install dependencies.
              run: |
                python -m pip install --upgrade pip  
                if [ -f requirement.txt ] pip install -r requirement.txt; fi

            -  name: code linter
               run: |
                 pip install flake8
                 #Stop if there python syntax error or undefined name.
                 flake8 . --count --select=E9,F63,F7,F28 --show-source --statistics

            -  name: Run unit tests
               run: |
                 pip install pytest
                 pytest

           #After Testing and building pythoncode we'll move to containerization and deployment.   
            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-Credentials@v4
              with:
                 aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                 aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                 aws-region: ${{ env.AWS_REGION }}

            - name: Login-ecr
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build , Tag and Push image.
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
                Image_Tag: latest
              run: |
                 docker built -t  $ECR_REGISTRY/$ECR_REPOSITORY:$Image_Tag . 
                 docker push  $ECR_REGISTRY/$ECR_REPOSITORY:$Image_Tag . 
          
   deploy-to-ec2:
     needs: run and pull
     runs-on: ubuntu-latest
     steps:
       - name: SSH into EC2 and Update Container
         uses: appleboy/ssh-action@v1.0.3
         with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: | 
            #Authenticate to EC2 docker client to ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} || true

            # Stop and remove the existing application container if it is running
            docker stop latest || true
            docker rm latest || true

            #pull, Build and run the Image
            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}://{{ env.ECR_REPOSITORY }}:latest
            docker run -d --name latest -p 80:5000 ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}://{{ env.ECR_REPOSITORY }}:latest